function toDt(d){const[dd,mm,yy]=d.split('/');return new Date(2000+~~yy,~~mm-1,~~dd);}
function sortA(a){return[...a].sort((x,y)=>toDt(x.data)-toDt(y.data));}
const baseIds=()=>new Set(BASE.map(e=>e.id));

function carica(){
  try{
    const raw=localStorage.getItem(LS_EXTRA);
    const extra=raw?JSON.parse(raw):[];
    const bid=baseIds();
    arch=sortA([...BASE,...extra.filter(e=>!bid.has(e.id))]);
  }catch{arch=[...BASE];}
  apiKey=localStorage.getItem(LS_KEY)||'';
}

function salvaExtra(){
  try{
    const bid=baseIds();
    localStorage.setItem(LS_EXTRA,JSON.stringify(arch.filter(e=>!bid.has(e.id))));
  }catch{}
}

function aggiungi(e){
  if(arch.some(x=>x.id===e.id)){toast('Concorso '+e.id+' già presente','warn');return false;}
  arch=sortA([...arch,e]);
  salvaExtra();
  return true;
}

const METODI={

function stats(){
  const fS={},fJ={},fSS={};
  for(let i=1;i<=90;i++){fS[i]=0;fJ[i]=0;fSS[i]=0;}
  arch.forEach(e=>{e.sestina.forEach(n=>fS[n]++);fJ[e.jolly]++;fSS[e.superstar]++;});
  const arr=o=>Object.entries(o).map(([k,v])=>({n:+k,f:v}));
  const desc=a=>[...a].sort((x,y)=>y.f-x.f), asc=a=>[...a].sort((x,y)=>x.f-y.f);
  const sa=arr(fS);
  return{fS,fJ,fSS,hot10:desc(sa).slice(0,10),cold10:asc(sa).slice(0,10),
    topSS:desc(arr(fSS)).slice(0,10),topJ:desc(arr(fJ)).slice(0,10),
    mxS:Math.max(...Object.values(fS)),mxJ:Math.max(...Object.values(fJ)),mxSS:Math.max(...Object.values(fSS))};
}

function roulette(pool,pesi){
  let t=pesi.reduce((a,b)=>a+b,0),r=Math.random()*t;
  for(let i=0;i<pool.length;i++){r-=pesi[i];if(r<=0)return i;}
  return pool.length-1;
}

function genera(mk){
  const st=stats(),{fS,fJ,fSS,mxS,mxJ,mxSS}=st,u30=arch.slice(-30);
  const pS=n=>{
    const f=fS[n]||0,mx=mxS||1,f30=u30.filter(e=>e.sestina.includes(n)).length;
    const ass=arch.slice().reverse().findIndex(e=>e.sestina.includes(n));
    if(mk==='CALDO')return 0.05+(f/mx)*4;
    if(mk==='FREDDO')return 0.05+(1-f/mx)*4;
    if(mk==='IBRIDO')return 0.2+(f/mx)*1.6+f30*0.15+Math.random()*0.4;
    if(mk==='QUANTISTICO')return 0.1+(f30/30)*2+(f/mx)*1.2+Math.min(ass/50,1)*0.8+Math.random()*0.3;
    return 0.3+(f/mx)*1.5+Math.random()*0.7;
  };
  const pJ=n=>0.15+((fJ[n]||0)/(mxJ||1))*2.8;
  const pSS=n=>0.15+((fSS[n]||0)/(mxSS||1))*2.8;
  const pool=[...Array(90)].map((_,i)=>i+1),nums=[];
  while(nums.length<6){const p=pool.filter(x=>!nums.includes(x));nums.push(p[roulette(p,p.map(pS))]);}
  nums.sort((a,b)=>a-b);
  const pj=pool.filter(x=>!nums.includes(x));
  return{nums,jolly:pj[roulette(pj,pj.map(pJ))],ss:pool[roulette(pool,pool.map(pSS))],mk};
}

function valuta(s){
  const u=arch[arch.length-1];
  const c=s.nums.filter(n=>u.sestina.includes(n));
  const jOk=s.jolly===u.jolly,ssOk=s.ss===u.superstar;
  const MAP=[[6,false,'🏆 SEI!',7,'#f59e0b'],[5,true,'💎 5+J',6,'#c084fc'],
    [5,false,'✨ CINQUE',5,'#34d399'],[4,false,'QUATTRO',4,'#60a5fa'],
    [3,false,'TRE',3,'#a3e635'],[2,false,'DUE',2,'#94a3b8'],[1,false,'UNO',1,'#6b7280']];
  let cat='—',rank=0,clr='#374151';
  for(const[cnt,nj,lb,rk,col]of MAP)if(c.length===cnt&&(!nj||jOk)){cat=lb;rank=rk;clr=col;break;}
  if(ssOk)cat+=' ⭐';
  return{c,jOk,ssOk,cat,rank,clr};
}

Sestina: 6 interi distinti 1-90 ordinati crescenti. Jolly e superstar: interi 1-90.
Se non ci sono nuove estrazioni: []`;

  try{
    setUpdStatus('loading','Connessione ad Anthropic AI…');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:2000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:prompt}]
      })
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      if(res.status===401)setUpdStatus('error','API Key non valida. Controllala in ⚙️ INFO.');
      else setUpdStatus('error','Errore API '+res.status+': '+(err.error?.message||'Controlla la connessione.'));
      return;
    }

    setUpdStatus('loading','AI sta cercando le estrazioni…');
    const data=await res.json();
    const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean=txt.replace(/```(?:json)?|```/g,'').trim();
    let parsed=[];
    try{parsed=JSON.parse(clean);}
    catch{const m=clean.match(/\[[\s\S]*\]/);if(m)try{parsed=JSON.parse(m[0]);}catch{}}

    if(!Array.isArray(parsed)||parsed.length===0){
      setUpdStatus('empty','Archivio già aggiornato. Nessuna estrazione dopo il '+u.data+'.');
      return;
    }
    updNuove=parsed;
    updIds={};
    setUpdStatus('found','');
    renderTab();
  }catch(e){
    if(e.message&&e.message.includes('fetch'))
      setUpdStatus('error','Connessione fallita. Verifica che Safari abbia accesso a internet.');
    else
      setUpdStatus('error','Errore: '+e.message);
  }
}

/* ═══ TOAST ═══ */
let tTimer=null;
function toast(msg,t='ok'){
  const el=document.getElementById('toast');
  const cols={ok:['rgba(5,46,22,.97)','#22c55e','#4ade80'],warn:['rgba(120,53,15,.97)','#f59e0b','#fde68a'],err:['rgba(127,29,29,.97)','#ef4444','#fca5a5']};
  const[bg,bc,tc]=cols[t]||cols.ok;
  el.style.cssText=`display:block;background:${bg};border:1px solid ${bc};color:${tc}`;
  el.textContent=msg;
  clearTimeout(tTimer);
  tTimer=setTimeout(()=>el.style.display='none',3400);
}

function aggiungiTutte(){
  const mancanti=updNuove.filter(e=>!arch.some(x=>x.id===e.id));

  mancanti.forEach((e,i)=>{
    const id=(updIds[i]||e.id||'').trim();

    if(aggiungi({...e,id})) ok++;
  });
  if(ok>0){toast('✓ '+ok+' estrazioni aggiunte e salvate!');renderTab();}
  else toast('Inserisci i numeri concorso mancanti','warn');

        color:#c4b5fd;font-size:8px;font-weight:700">${e.jolly}</span></td>
      <td><span style="display:inline-flex;align-items:center;justify-content:center;
        width:20px;height:20px;border-radius:50%;background:linear-gradient(145deg,#431407,#78350f);
        color:#fde68a;font-size:8px;font-weight:700">${e.superstar}</span></td>
    </tr>`;
  });
  h+=`</tbody></table></div>
    <div class="pag">
      <button class="pag-btn" id="pag-prec" ${archPage===0?'disabled':''}>← PREC</button>
      <span style="font-size:8px;color:#1e3a5f">${archPage*PER+1}–${Math.min((archPage+1)*PER,arch.length)} di ${arch.length} · pag ${archPage+1}/${pages}</span>
      <button class="pag-btn" id="pag-succ" ${archPage>=pages-1?'disabled':''}>SUCC →</button>
    </div></div>`;
  return h;
}

/* ═══ BIND EVENTS ═══ */
function bindEvents(){
  // nav
  document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
  // metodo
  document.querySelectorAll('[data-mk]').forEach(b=>b.onclick=()=>{metodo=b.dataset.mk;renderTab();});
  // genera
  const bg=document.getElementById('btn-gen');
  if(bg)bg.onclick=()=>{
    bg.disabled=true;bg.innerHTML='<span class="spin"></span> ANALISI…';
    setTimeout(()=>{
      const alts=Object.keys(METODI).filter(k=>k!==metodo);
      const m2=alts[Math.floor(Math.random()*alts.length)];
      sestine=[genera(metodo),genera(m2)];genCount++;
      renderTab();
    },1100);
  };
  const br=document.getElementById('btn-rg');if(br)br.onclick=()=>{document.getElementById('btn-gen')?.click();};
  const bc=document.getElementById('btn-cl');if(bc)bc.onclick=()=>{sestine=[];renderTab();};
  // aggiorna
  const bu=document.getElementById('btn-cerca');if(bu)bu.onclick=()=>{cercaNuove().then(()=>renderUpdBlock());};
  const brx=document.getElementById('btn-reset');if(brx)brx.onclick=resetExtra;
  // manuale
  const bm=document.getElementById('btn-madd');
  if(bm)bm.onclick=()=>{
    const err=document.getElementById('m-err');err.style.display='none';
    const id=(document.getElementById('mi')?.value||'').trim();
    const dt=(document.getElementById('md')?.value||'').trim();
    const nums=(document.getElementById('mn')?.value||'').trim().split(/[\s,]+/).map(Number).filter(Boolean);
    const j=+(document.getElementById('mj')?.value||0);
    const ss=+(document.getElementById('ms')?.value||0);
    const jp=(document.getElementById('mjp')?.value||'').trim();
    if(!id){err.textContent='Inserisci il numero concorso (es. 36/26)';err.style.display='block';return;}
    if(!dt){err.textContent='Inserisci la data (es. 01/03/26)';err.style.display='block';return;}
    if(nums.length!==6||new Set(nums).size!==6||nums.some(x=>x<1||x>90)){err.textContent='6 numeri distinti tra 1 e 90';err.style.display='block';return;}
    if(!j||j<1||j>90){err.textContent='Jolly non valido (1-90)';err.style.display='block';return;}
    if(!ss||ss<1||ss>90){err.textContent='SuperStar non valido (1-90)';err.style.display='block';return;}
    const entry={id,data:dt,sestina:nums.sort((a,b)=>a-b),jolly:j,superstar:ss};
    if(jp)entry.jackpot=+jp;
    if(aggiungi(entry)){['mi','md','mn','mj','ms','mjp'].forEach(x=>document.getElementById(x)&&(document.getElementById(x).value=''));renderTab();}
  };
  const bmr=document.getElementById('btn-mrst');
  if(bmr)bmr.onclick=()=>{['mi','md','mn','mj','ms','mjp'].forEach(x=>document.getElementById(x)&&(document.getElementById(x).value=''));document.getElementById('m-err').style.display='none';};
  // paginazione
  const pp=document.getElementById('pag-prec');if(pp)pp.onclick=()=>{archPage=Math.max(0,archPage-1);renderTab();};
  const ps=document.getElementById('pag-succ');if(ps)ps.onclick=()=>{archPage++;renderTab();};
  // upd block (dopo render)
  if(curTab==='aggiorna') renderUpdBlock();
}

/* ═══ AZIONI GLOBALI ═══ */
function resetExtra(){
  if(!confirm('Eliminare le estrazioni aggiunte? Lo storico base ('+BASE.length+') rimane intatto.'))return;
  try{localStorage.removeItem(LS_EXTRA);}catch{}
  arch=[...BASE];updNuove=[];updIds={};updPhase='idle';
  toast('Estrazioni extra eliminate','warn');renderTab();
}
function cancellaKey(){
  if(!confirm('Rimuovere la API Key?'))return;
  apiKey='';
  try{localStorage.removeItem(LS_KEY);}catch{}
  toast('API Key rimossa','warn');renderTab();
}

carica();
renderTab();
